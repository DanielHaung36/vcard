<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Card</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #000000;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    max-width: 420px;
    width: 100%;
    overflow: hidden;
  }
  .card-header {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    color: #fff;
    padding: 40px 30px 30px;
    text-align: center;
  }
  .logo {
    margin: 0 auto 16px;
    text-align: center;
  }
  .logo img {
    width: 160px;
    height: auto;
  }
  .logo-tagline {
    font-size: 11px;
    opacity: 0.7;
    letter-spacing: 0.5px;
    margin-bottom: 20px;
  }
  .card-header h1 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .card-header .title {
    font-size: 14px;
    opacity: 0.8;
    font-weight: 400;
  }
  .company-name {
    font-size: 15px;
    opacity: 0.9;
    margin-top: 4px;
    font-weight: 500;
  }
  .card-body {
    padding: 24px 30px;
  }
  .info-item {
    display: flex;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid #f0f0f0;
    text-decoration: none;
    color: #333;
    transition: background 0.2s;
    margin: 0 -30px;
    padding-left: 30px;
    padding-right: 30px;
  }
  .info-item:last-child { border-bottom: none; }
  .info-item:hover { background: #f8f9fa; }
  .info-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 14px;
    flex-shrink: 0;
    font-size: 18px;
  }
  .icon-phone { background: #e8f5e9; color: #2e7d32; }
  .icon-email { background: #e3f2fd; color: #1565c0; }
  .icon-web { background: #f3e5f5; color: #7b1fa2; }
  .icon-addr { background: #fff3e0; color: #e65100; }
  .info-text {
    flex: 1;
    min-width: 0;
  }
  .info-label {
    font-size: 12px;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .info-value {
    font-size: 15px;
    color: #333;
    word-break: break-all;
  }
  .save-btn {
    display: block;
    width: calc(100% - 60px);
    margin: 0 30px 24px;
    padding: 16px;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    letter-spacing: 0.5px;
  }
  .save-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(26,26,46,0.3);
  }
  .save-btn:active { transform: translateY(0); }
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 14px 24px;
    border-radius: 12px;
    font-size: 14px;
    text-align: center;
    z-index: 999;
    max-width: 340px;
    line-height: 1.5;
    animation: fadeInUp 0.3s ease;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateX(-50%) translateY(20px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  .error-msg {
    text-align: center;
    padding: 60px 30px;
    color: #999;
    font-size: 16px;
  }
</style>
</head>

<script>
  // Support both ?query and #hash params
  const rawParams = window.location.hash.length > 1
    ? window.location.hash.substring(1)
    : window.location.search.substring(1);
  const params = new URLSearchParams(rawParams);
  const data = {
    name: params.get('n') || '',
    title: params.get('t') || '',
    company: params.get('c') || 'Your Company',
    phone: params.get('p') || '',
    email: params.get('e') || '',
    website: params.get('w') || '',
    address: params.get('a') || '',
  };

  if (!data.name) {
    document.getElementById('error').style.display = 'block';
  } else {
    document.getElementById('content').style.display = 'block';

    document.getElementById('name').textContent = data.name;
    document.getElementById('jobTitle').textContent = data.title;
    document.getElementById('company').textContent = data.company;

    if (data.phone) {
      document.getElementById('phone').textContent = data.phone;
      document.getElementById('phoneRow').href = 'tel:' + data.phone;
    } else {
      document.getElementById('phoneRow').style.display = 'none';
    }

    if (data.email) {
      document.getElementById('email').textContent = data.email;
      document.getElementById('emailRow').href = 'mailto:' + data.email;
    } else {
      document.getElementById('emailRow').style.display = 'none';
    }

    if (data.website) {
      document.getElementById('web').textContent = data.website.replace(/^https?:\/\//, '');
      document.getElementById('webRow').href = data.website.startsWith('http') ? data.website : 'https://' + data.website;
      document.getElementById('webRow').style.display = 'flex';
    }

    if (data.address) {
      document.getElementById('addr').textContent = data.address;
      document.getElementById('addrRow').style.display = 'flex';
    }
  }

  function esc(s) {
    return String(s || '').replace(/\\/g,'\\\\').replace(/\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;');
  }

  function buildVCard() {
    var nameParts = data.name.trim().split(/\s+/);
    var lastName = nameParts.length > 1 ? nameParts.pop() : '';
    var firstName = nameParts.join(' ');
    var v = 'BEGIN:VCARD\r\nVERSION:3.0\r\n';
    v += 'N:' + esc(lastName) + ';' + esc(firstName) + ';;;\r\n';
    v += 'FN:' + esc(data.name) + '\r\n';
    if (data.company) v += 'ORG:' + esc(data.company) + '\r\n';
    if (data.title) v += 'TITLE:' + esc(data.title) + '\r\n';
    if (data.phone) v += 'TEL;TYPE=WORK,VOICE:' + data.phone + '\r\n';
    if (data.email) v += 'EMAIL;TYPE=WORK:' + data.email + '\r\n';
    if (data.website) {
      var url = data.website.startsWith('http') ? data.website : 'https://' + data.website;
      v += 'URL:' + url + '\r\n';
    }
    if (data.address) v += 'ADR;TYPE=WORK:;;' + esc(data.address) + ';;;;\r\n';
    v += 'END:VCARD\r\n';
    return v;
  }

  function showToast(msg, duration) {
    var el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(function() { el.remove(); }, duration || 4000);
  }

  function saveContact() {
    var vcard = buildVCard();
    var fileName = (data.name || 'contact') + '.vcf';
    var blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

    if (isIOS) {
      // Try blob URL first (works in Safari)
      var blobUrl = URL.createObjectURL(blob);
      window.location.href = blobUrl;
      // Fallback for in-app browsers (WeChat, DingTalk, etc.)
      // If blob URL didn't trigger contacts UI, try data URI after a short delay
      setTimeout(function() {
        var reader = new FileReader();
        reader.onload = function() {
          window.location.href = reader.result;
        };
        reader.readAsDataURL(blob);
      }, 1500);
      return;
    }

    // Android: try Web Share API first (shows share sheet → pick Contacts)
    try {
      var file = new File([blob], fileName, { type: 'text/vcard' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file] }).catch(function() {});
        return;
      }
    } catch(e) {}

    // Fallback: try blob URL navigation (works on Samsung Internet, some others)
    var blobUrl = URL.createObjectURL(blob);
    var w = window.open(blobUrl, '_blank');
    if (w) return;

    // Last resort: download .vcf file
    var a = document.createElement('a');
    a.href = blobUrl;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    a.remove();
    showToast('File downloaded. Open the .vcf file to add contact.');
  }
</script>
</body>
</html>
