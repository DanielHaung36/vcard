<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Card</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #000;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    max-width: 420px;
    width: 100%;
    overflow: hidden;
    text-align: center;
    padding: 50px 30px;
  }
  .card h1 {
    font-size: 28px;
    color: #1a1a2e;
    margin-bottom: 8px;
  }
  .card p {
    font-size: 16px;
    color: #666;
  }
  .coming-soon {
    margin-top: 30px;
    font-size: 13px;
    color: #bbb;
  }
</style>
</head>
<body>
<div class="card">
  <h1 id="name"></h1>
  <p id="title"></p>
  <div class="coming-soon">More details coming soon...</div>
</div>
<script>
  const rawParams = window.location.search.substring(1) || window.location.hash.substring(1);
  const params = new URLSearchParams(rawParams);
  const name = params.get('n') || '';
  const title = params.get('t') || '';
  if (name) {
    document.getElementById('name').textContent = name;
    document.getElementById('title').textContent = title;
  } else {
    document.querySelector('.card').innerHTML = '<p style="color:#999;">Page under construction.</p>';
  }
</script>
</body>
</html>
